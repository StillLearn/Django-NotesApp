<!DOCTYPE html>
<html>
<head>
    <title>Study Notes</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #333; }
        .note { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .note h3 { margin: 0 0 10px; }
        .note a { margin-right: 10px; }
        .btn { background: #007bff; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Study Notes</h1>
    <a class="btn" href="{% url 'note_create' %}">New Note</a>
    {% for note in notes %}
        <div class="note">
            <h3>{{ note.title }}</h3>
            <p><strong>Subject:</strong> {{ note.subject.name }}</p>
            <p>{{ note.content|truncatewords:30 }}</p>
            <a href="{% url 'note_detail' note.id %}">View</a>
            <a href="{% url 'note_edit' note.id %}">Edit</a>
        </div>
    {% empty %}
        <p>No notes yet. Create your first note!</p>
    {% endfor %}
</body>
</html>
